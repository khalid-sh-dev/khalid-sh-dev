    <!-- SEO host guard — runs SYNCHRONOUSLY before any render or asset load.
         On lovable.app (staging mirror) it (1) injects noindex/nofollow so
         crawlers that ignore JS never index the preview, and (2) replaces
         the location with the production vercel.app origin, preserving the
         path (incl. trailing slash), search, and hash exactly. -->
    <script>
      (function () {
        try {
          var PROD = "https://khalid-sh-dev.vercel.app";
          var host = window.location.hostname || "";
          if (host.indexOf("lovable.app") !== -1) {
            var m = document.createElement("meta");
            m.name = "robots";
            m.content = "noindex, nofollow, noarchive";
            m.setAttribute("data-seo-guard", "1");
            (document.head || document.documentElement).appendChild(m);
            var target =
              PROD +
              window.location.pathname +
              window.location.search +
              window.location.hash;
            window.location.replace(target);
          }
        } catch (e) {}
      })();
    </script>
